{% extends "base.html" %}

{% block title %}編輯 - Vellichor{% endblock %}

{% block content %}
  <div class="editor-shell">
    <div class="editor-header">
      <div>
        <div class="editor-kicker">Edit entry</div>
        <div class="editor-title">調整內容</div>
      </div>
      <div class="row">
        <a class="btn" href="/entry/{{ entry.id }}">取消</a>
      </div>
    </div>

    <form class="editor-form paper" method="post" action="/entry/{{ entry.id }}/edit">
      <label class="field">
        <div class="field-label">標題</div>
        <input class="field-input" type="text" name="title" value="{{ entry.title }}" autofocus />
      </label>

      <label class="field">
        <div class="field-label">內容</div>
        <textarea class="field-textarea" name="content">{{ entry.content }}</textarea>
      </label>

      <div class="editor-footer">
        <button class="btn primary" type="submit">儲存</button>
        <div class="muted">更新後會重新加密保存</div>
      </div>
    </form>
  </div>
{% endblock %}
