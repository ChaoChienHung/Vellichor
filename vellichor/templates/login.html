{% extends "base.html" %}

{% block title %}登入 - Vellichor{% endblock %}

{% block content %}
  <div class="editor-shell">
    <div class="editor-header">
      <div>
        <div class="editor-kicker">Login</div>
        <div class="editor-title">登入</div>
      </div>
      <div class="row">
        <a class="btn" href="/signup">註冊</a>
      </div>
    </div>

    <form class="editor-form paper" method="post" action="/login">
      <label class="field">
        <div class="field-label">Username</div>
        <input class="field-input" type="text" name="username" value="{{ username }}" autofocus />
      </label>

      <label class="field">
        <div class="field-label">Password</div>
        <input class="field-input" type="password" name="password" />
      </label>

      {% if error %}
        <div class="spacer-10"></div>
        <div class="muted">{{ error }}</div>
      {% endif %}

      <div class="editor-footer">
        <button class="btn primary" type="submit">登入</button>
      </div>
    </form>
  </div>
{% endblock %}
