{% extends "base.html" %}

{% block title %}註冊 - Vellichor{% endblock %}

{% block content %}
  <div class="auth-notepad">
    <div class="auth-notepad-inner">
      <div class="auth-top">
        <div class="auth-title">Sign up</div>
      </div>

      <form class="auth-form" method="post" action="/signup">
        <label class="auth-field">
          <span class="visually-hidden">Username</span>
          <input class="auth-input" type="text" name="username" value="{{ username }}" placeholder="Username" autofocus />
        </label>

        <label class="auth-field">
          <span class="visually-hidden">Pen Name</span>
          <input class="auth-input" type="text" name="pen_name" value="{{ pen_name }}" placeholder="Pen Name" />
        </label>

        <label class="auth-field">
          <span class="visually-hidden">Password</span>
          <input class="auth-input" type="password" name="password" placeholder="Password" />
        </label>

        {% if error %}
          <div class="auth-error">{{ error }}</div>
        {% endif %}

        <div class="auth-actions">
          <button class="auth-btn primary" type="submit">Sign up</button>
          <a class="auth-btn" href="/login">Login</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
