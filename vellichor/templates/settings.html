{% extends "base.html" %}

{% block title %}設定 - Vellichor{% endblock %}

{% block content %}
  <div class="editor-shell">
    <div class="editor-header">
      <div>
        <div class="editor-kicker">Settings</div>
        <div class="editor-title">設定</div>
      </div>
      <div class="row">
        <a class="btn" href="/">返回</a>
      </div>
    </div>

    <form class="editor-form paper" method="post" action="/settings">
      <label class="field">
        <div class="field-label">Pen Name</div>
        <input class="field-input" type="text" name="pen_name" value="{{ pen_name }}" />
      </label>

      {% if error %}
        <div class="spacer-10"></div>
        <div class="muted">{{ error }}</div>
      {% endif %}

      <div class="editor-footer">
        <button class="btn primary" type="submit">儲存</button>
      </div>
    </form>
  </div>
{% endblock %}
