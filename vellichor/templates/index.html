{% extends "base.html" %}

{% block title %}Vellichor{% endblock %}

{% block content %}
  <div class="cover-wrap home-cover">
    <div class="home">
      <header class="home-header">
      <h1 class="home-title">Vellichor</h1>
      </header>

      <section class="diary-input-section">
        <form id="new-entry-form" method="post" action="/entry/new">
          <div class="diary-toprow">
            <div class="field grow">
              <div class="field-label">Title / 標題</div>
              <input class="field-input" type="text" name="title" placeholder="Title" />
            </div>
            <label class="field diary-date">
              <div class="diary-date-row">
                <span class="diary-date-prefix">Date:</span>
                <span class="diary-date-control">
                  <input class="field-input" type="date" name="date" />
                  <span class="diary-date-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M8 2v3M16 2v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M4.5 9.5h15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M6.5 5.5h11c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2h-11c-1.1 0-2-.9-2-2v-12c0-1.1.9-2 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                  </span>
                </span>
              </div>
            </label>
          </div>
          <div class="spacer-2"></div>
          <textarea class="diary-textarea" name="content" rows="9" placeholder="What's on your mind today? / 想寫點什麼？"></textarea>
        </form>
      </section>

      <section class="notes-grid">
        {% for e in entries %}
          <a class="note-card" href="/entry/{{ e.id }}">
            <div class="note-text">{{ e.preview }}</div>
            <div class="note-footer">
              <span data-iso="{{ e.created_at }}">{{ e.created_at }}</span>
              <span>Open / 打開</span>
            </div>
          </a>
        {% endfor %}
      </section>

      <div class="save-btn-container">
        <button class="save-btn" type="submit" form="new-entry-form" aria-label="Sign">Sign</button>
      </div>
    </div>
  </div>
{% endblock %}
