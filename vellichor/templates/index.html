{% extends "base.html" %}

{% block title %}Vellichor{% endblock %}

{% block content %}
  <div class="cover-wrap home-cover">
    <div class="home">
      <header class="home-header">
      <h1 class="home-title">Vellichor</h1>
      </header>

      <section class="diary-input-section">
        <form method="post" action="/entry/new">
          <div class="diary-toprow">
            <div class="field grow">
              <div class="field-label">Title / 標題</div>
              <input class="field-input" type="text" name="title" placeholder="Title" />
            </div>
            <label class="field diary-date">
              <div class="diary-date-row">
                <span class="diary-date-prefix">Date</span>
                <input class="field-input" type="date" name="date" />
              </div>
            </label>
          </div>
          <div class="spacer-10"></div>
          <textarea class="diary-textarea" name="content" rows="9" placeholder="What's on your mind today? / 想寫點什麼？"></textarea>
          <div class="save-btn-container">
            <button class="save-btn" type="submit">Write to Diary / 寫入日記</button>
          </div>
        </form>
      </section>

      <section class="notes-grid">
        {% for e in entries %}
          <a class="note-card" href="/entry/{{ e.id }}">
            <div class="note-text">{{ e.preview }}</div>
            <div class="note-footer">
              <span data-iso="{{ e.created_at }}">{{ e.created_at }}</span>
              <span>Open / 打開</span>
            </div>
          </a>
        {% endfor %}
      </section>
    </div>
  </div>
{% endblock %}
